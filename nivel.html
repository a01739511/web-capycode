<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Nivel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Metamorphous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            var mobileRegex = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Silk/i;
            var userAgent = navigator.userAgent || navigator.vendor || window.opera || "";
            var isMobileDevice = mobileRegex.test(userAgent);
            window.CAPYCODE_MOBILE_DOWNLOAD_ONLY = isMobileDevice;

            if (isMobileDevice) {
                document.documentElement.classList.add("mobile-download-mode");
            }
        }());
    </script>
    <style>
        html.mobile-download-mode body {
            margin: 0;
            overflow: hidden;
            background: #120a22;
        }

        html.mobile-download-mode body > :not(.mobile-download-shell) {
            display: none !important;
        }

        html.mobile-download-mode .mobile-download-shell {
            display: grid !important;
        }
    </style>
</head>
<body class="scene-body quiz-page" data-requires-auth="true">
    <div class="mobile-download-shell">
        <main class="mobile-download-screen glass-surface">
            <div class="mobile-download-copy">
                <p class="eyebrow">CapyCode</p>
                <h1>Descarga la app</h1>
                <p>La versi&oacute;n m&oacute;vil de CapyCode vive en la app. Inst&aacute;lala para seguir explorando niveles, rutas y personajes.</p>
                <div class="mobile-download-actions">
                    <a class="mobile-download-button" href="assets/downloads/CapyCode.apk" download="CapyCode.apk">Descargar la app</a>
                </div>
            </div>
            <div class="mobile-download-art">
                <img src="assets/characters/no_bg/Capy_Runa.png" alt="Capy Runa">
            </div>
        </main>
    </div>
    <div class="sidebar-layout">
        <aside class="sidebar-panel app-sidebar glass-surface" data-app-sidebar>
            <a class="sidebar-brand" href="mapa.html">CapyCode</a>
            <nav class="sidebar-nav" data-sidebar-nav></nav>
            <div class="sidebar-skin-card" data-sidebar-skin></div>
        </aside>

        <div class="sidebar-main">
            <div class="gameplay-shell" data-level-runner="true">
                <header class="scene-topbar glass-surface">
                    <button class="menu-link" type="button" data-action="toggle-sidebar">
                        <img src="assets/menu-icon.svg" alt="">
                        <span>Men&uacute;</span>
                    </button>
                    <div class="topbar-page-title" id="mission-label">Nivel</div>
                    <div class="topbar-right">
                        <div class="hud-stat has-icon">
                            <img src="assets/hud-streak.svg" alt="" aria-hidden="true">
                            <span>Racha</span>
                            <strong data-player-streak>0</strong>
                        </div>
                        <div class="hud-stat has-icon">
                            <img src="assets/hud-xp.svg" alt="" aria-hidden="true">
                            <span>XP</span>
                            <strong data-player-xp>0</strong>
                        </div>
                        <a class="profile-link" href="perfil.html">
                            <img src="assets/user-avatar.svg" alt="Perfil">
                        </a>
                    </div>
                </header>

                <main class="game-stage">
                    <section class="mission-hero glass-surface">
                        <div class="mission-question-summary">
                            <p class="panel-kicker">Ejercicio</p>
                            <h2 id="question-title">Cargando nivel</h2>
                        </div>
                        <div class="mission-hero-progress">
                            <div class="mission-progress-head">
                                <p class="panel-kicker">Progreso</p>
                                <strong id="progress-ratio">1/5</strong>
                            </div>
                            <div class="progress-track">
                                <div class="progress-meter" id="progress-fill"></div>
                            </div>
                            <div class="mission-timer" id="exercise-timer">
                                <span>Tiempo</span>
                                <strong>0s</strong>
                            </div>
                        </div>
                    </section>

                    <section class="game-panel glass-surface">
                        <div id="question-content"></div>
                        <p class="feedback-banner" id="feedback-message"></p>
                        <div class="action-strip">
                            <button class="scene-button ghost" id="secondary-action-button" type="button">Reiniciar nivel</button>
                            <button class="scene-button primary" id="primary-action-button" type="button">Comprobar</button>
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <script src="js/app-data.js"></script>
    <script src="js/runtime-config.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/hotkeys.js"></script>
    <script src="js/common.js"></script>
    <script src="js/questions-data.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
