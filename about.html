<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Historia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Metamorphous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body class="scene-body" data-requires-auth="true">
    <div class="sidebar-layout">
        <aside class="sidebar-panel glass-surface">
            <a class="sidebar-brand" href="mapa.html">CapyCode</a>
            <nav class="sidebar-nav">
                <a href="perfil.html">Perfil</a>
                <a href="mapa.html">Mapa</a>
                <a href="tienda.html">Tienda</a>
                <a class="is-active" href="about.html">Historia</a>
            </nav>
        </aside>

        <div class="sidebar-main">
            <header class="scene-topbar glass-surface">
                <div class="scene-heading">
                    <img src="assets/magic-wand.svg" alt="">
                    <h1>Historia CapyCode</h1>
                </div>
                <div class="topbar-right">
                    <div class="hud-stat">
                        <span>Racha</span>
                        <strong data-player-streak>0</strong>
                    </div>
                    <div class="hud-stat">
                        <span>XP</span>
                        <strong data-player-xp>0</strong>
                    </div>
                    <a class="profile-link" href="perfil.html">
                        <img src="assets/user-avatar.svg" alt="Perfil">
                    </a>
                </div>
            </header>

            <main class="about-layout">
                <section class="glass-surface about-story" id="about-story"></section>
                <section class="glass-surface about-mentors">
                    <div class="panel-header">
                        <div>
                            <p class="panel-kicker">Mentores</p>
                            <h2>Personajes principales</h2>
                        </div>
                    </div>
                    <div class="mentor-grid" id="about-mentors"></div>
                </section>
                <section class="glass-surface about-extras" id="about-extras"></section>
            </main>
        </div>
    </div>

    <script src="js/app-data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/about.js"></script>
</body>
</html>
