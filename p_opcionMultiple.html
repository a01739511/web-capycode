<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Nivel 5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Metamorphous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body class="scene-body" data-requires-auth="true">
    <div class="nav-scrim" data-sidebar-close></div>
    <aside class="app-drawer glass-surface" data-app-sidebar>
        <a class="sidebar-brand" href="mapa.html">CapyCode</a>
        <nav class="sidebar-nav">
            <a href="perfil.html">Perfil</a>
            <a href="mapa.html">Mapa</a>
            <a href="tienda.html">Tienda</a>
            <a href="about.html">Historia</a>
        </nav>
        <div class="sidebar-skin-card" data-sidebar-skin></div>
    </aside>
    <div class="scene-shell gameplay-shell" data-question-types="opcion_multiple,respuesta_numerica,seleccionar_lineas" data-progress-key="mission" data-progress-label="NIVEL 5: CICLOS" data-next-page="p_ordenarLineas.html">
        <header class="scene-topbar glass-surface">
            <button class="menu-link" type="button" data-action="toggle-sidebar">
                <img src="assets/menu-icon.svg" alt="">
                <span>Men&uacute;</span>
            </button>
            <div class="topbar-right">
                <div class="hud-stat">
                    <span>Racha</span>
                    <strong data-player-streak>0</strong>
                </div>
                <div class="hud-stat">
                    <span>XP Points</span>
                    <strong data-player-xp>0</strong>
                </div>
                <a class="profile-link" href="perfil.html">
                    <img src="assets/user-avatar.svg" alt="Perfil">
                </a>
            </div>
        </header>

        <main class="game-stage">
            <section class="glass-surface page-hero page-hero-compact">
                <p class="panel-kicker">Nivel 5</p>
                <h1>Ciclos</h1>
                <p class="page-subtitle">Resuelve acertijos de salida, selecci&oacute;n y lectura de c&oacute;digo dentro del c&iacute;rculo de repetici&oacute;n.</p>
            </section>

            <section class="progress-block">
                <div class="progress-copy">
                    <p id="mission-label">NIVEL 5: CICLOS</p>
                    <h2>Progreso de la misi&oacute;n</h2>
                </div>
                <span id="progress-ratio">8/12</span>
                <div class="progress-track">
                    <div class="progress-meter" id="progress-fill"></div>
                </div>
            </section>

            <section class="question-banner glass-surface">
                <h2 id="question-title">&iquest;Cu&aacute;l es el output de este c&oacute;digo?</h2>
            </section>

            <section class="game-panel glass-surface">
                <div id="question-content"></div>
                <p class="feedback-banner" id="feedback-message"></p>
                <div class="action-strip">
                    <button class="scene-button ghost" id="secondary-action-button" type="button">Reiniciar reto</button>
                    <button class="scene-button primary" id="primary-action-button" type="button">Comprobar</button>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app-data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/questions-data.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
