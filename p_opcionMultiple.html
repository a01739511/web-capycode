<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Misi&oacute;n principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body data-requires-auth="true">
    <div class="app-container" data-game-mode="mission" data-filter-type="">
        <header class="top-nav glass-panel">
            <div class="nav-left">
                <a class="brand-link" href="p_opcionMultiple.html">
                    <img src="assets/magic-wand.svg" alt="" class="wand-icon">
                    <span class="menu-text">CapyCode</span>
                </a>
                <nav class="quick-nav" aria-label="Secciones del juego">
                    <a class="quick-nav-link is-active" href="p_opcionMultiple.html">Misi&oacute;n</a>
                    <a class="quick-nav-link" href="p_ordenarLineas.html">Ordenar l&iacute;neas</a>
                </nav>
            </div>

            <div class="nav-right">
                <div class="stat-box">
                    <span class="stat-label">USUARIO</span>
                    <span class="stat-value" id="player-name">Invitado</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">RACHA</span>
                    <span class="stat-value" id="streak-value">0</span>
                </div>
                <div class="stat-box xp-box">
                    <span class="stat-label">XP</span>
                    <span class="stat-value" id="xp-value">0</span>
                </div>
                <button class="secondary-btn" type="button" id="logout-button">Salir</button>
            </div>
        </header>

        <section class="progress-section">
            <div class="progress-info">
                <div class="mission-texts">
                    <p class="level-category" id="mission-label">ALGORITMOS | NIVEL FACIL</p>
                    <h1 class="mission-text" id="mission-title">Misi&oacute;n principal</h1>
                </div>
                <span class="progress-ratio" id="progress-ratio">0/0</span>
            </div>
            <div class="progress-bar" aria-hidden="true">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </section>

        <main class="question-container">
            <section class="question-header glass-panel">
                <p class="question-kicker" id="question-type-label">Preparando actividad</p>
                <h2 class="question-title" id="question-title">Cargando pregunta...</h2>
            </section>

            <section class="glass-panel content-panel">
                <div id="question-content" class="question-content"></div>
                <p class="feedback-message" id="feedback-message" aria-live="polite"></p>

                <div class="action-row">
                    <button type="button" class="secondary-btn" id="restart-button">Reiniciar misi&oacute;n</button>
                    <button type="button" class="btn-primary" id="primary-action-button">Comprobar</button>
                </div>
            </section>
        </main>

        <section class="world-grid">
            <article class="glass-panel world-card story-card" id="academy-story"></article>
            <article class="glass-panel world-card map-card" id="academy-map"></article>
            <article class="glass-panel world-card roster-card" id="mentor-roster"></article>
        </section>
    </div>

    <script src="js/world-data.js"></script>
    <script src="js/questions-data.js"></script>
    <script src="js/game.js"></script>
    <script src="js/world.js"></script>
</body>
</html>
