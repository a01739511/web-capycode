<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Metamorphous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page" data-auth-mode="register">
    <div class="logo-container">
        <img src="assets/Logo de CapyCode.png" alt="Logo de CapyCode">
    </div>

    <div class="login-wrapper">
        <main class="login-card glass-surface">
            <p class="eyebrow">Registro</p>
            <h1 class="login-title">Crear cuenta</h1>
            <p class="auth-description">
                Crea tu acceso a CapyCode. Por ahora, cualquier usuario y contrase&ntilde;a v&aacute;lidos te dejan entrar.
            </p>

            <form class="login-form" id="auth-form" novalidate>
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Elige un nombre de usuario"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="password">Contrase&ntilde;a</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Usa al menos 8 caracteres"
                        autocomplete="new-password"
                        required
                        minlength="8"
                    >
                </div>

                <p class="form-message" id="form-message" aria-live="polite"></p>

                <button type="submit" class="btn-primary">Registrarme</button>
            </form>

            <p class="register-link">
                &iquest;Ya tienes cuenta?
                <a href="iniciar_sesion.html">Iniciar sesi&oacute;n</a>
            </p>
        </main>
    </div>

    <script src="js/hotkeys.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
