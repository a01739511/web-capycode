<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Metamorphous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">

    <link rel="manifest" href="site.webmanifest?v=20260528a">
    <link rel="stylesheet" href="style.css?v=20260528a">
    <script>
        (function () {
            var mobileRegex = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|Silk/i;
            var userAgent = navigator.userAgent || navigator.vendor || window.opera || "";
            var isMobileDevice = mobileRegex.test(userAgent);
            window.CAPYCODE_MOBILE_DOWNLOAD_ONLY = isMobileDevice;

            if (isMobileDevice) {
                document.documentElement.classList.add("mobile-download-mode");
            }
        }());
    </script>
    <style>
        html.mobile-download-mode body {
            margin: 0;
            overflow: hidden;
            background: #120a22;
        }

        html.mobile-download-mode body > :not(.mobile-download-shell) {
            display: none !important;
        }

        html.mobile-download-mode .mobile-download-shell {
            display: grid !important;
        }
    </style>
</head>
<body class="scene-body" data-requires-auth="true">
    <div class="mobile-download-shell">
        <main class="mobile-download-screen glass-surface">
            <div class="mobile-download-copy">
                <p class="eyebrow">CapyCode</p>
                <h1>Descarga la app</h1>
                <p>La versi&oacute;n m&oacute;vil de CapyCode vive en la app. Inst&aacute;lala para seguir explorando niveles, rutas y personajes.</p>
                <div class="mobile-download-actions">
                    <a class="mobile-download-button" href="https://drive.google.com/file/d/145FS1bvHmpr1v1R_6B2WZRpDA2tC1vvf/view" target="_blank" rel="noopener noreferrer">Descargar la app</a>
                </div>
            </div>
            <div class="mobile-download-art">
                <img src="assets/characters/no_bg/Capy_Runa.webp" alt="Capy Runa">
            </div>
        </main>
    </div>
    <div class="sidebar-layout">
        <aside class="sidebar-panel app-sidebar glass-surface" data-app-sidebar>
            <a class="sidebar-brand" href="mapa.html">CapyCode</a>
            <nav class="sidebar-nav" data-sidebar-nav></nav>
            <div class="sidebar-skin-card" data-sidebar-skin></div>
        </aside>

        <div class="sidebar-main">
            <header class="scene-topbar glass-surface">
                <button class="menu-link" type="button" data-action="toggle-sidebar">
                    <img src="assets/menu-icon.svg" alt="">
                    <span>Men&uacute;</span>
                </button>
                <div class="topbar-page-title" aria-label="Perfil">Perfil</div>
                <div class="topbar-right">
                    <div class="hud-stat">
                        <span>Racha</span>
                        <strong data-player-streak>0</strong>
                    </div>
                    <div class="hud-stat">
                        <span>XP</span>
                        <strong data-player-xp>0</strong>
                    </div>
                    <a class="profile-link" href="perfil.html">
                        <img src="assets/user-avatar.svg" alt="Perfil">
                    </a>
                </div>
            </header>

            <main class="profile-layout">
                <section id="profile-hero"></section>

                <section class="glass-surface profile-section" id="profile-collection-section">
                    <div class="panel-header">
                        <div>
                            <p class="panel-kicker">Colecci&oacute;n</p>
                            <h2>Vestuarios desbloqueados</h2>
                        </div>
                        <div class="collection-counter" id="profile-collection-count"></div>
                    </div>
                    <div class="collection-carousel" id="profile-collection"></div>
                </section>

                <section class="glass-surface profile-section" id="profile-badges-section">
                    <div class="panel-header">
                        <div>
                            <p class="panel-kicker">Insignias</p>
                            <h2>Progreso por rutas</h2>
                        </div>
                    </div>
                    <div class="badge-grid" id="profile-badges"></div>
                </section>
            </main>
        </div>
    </div>
