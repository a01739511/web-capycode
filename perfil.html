<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Metamorphous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body class="scene-body" data-requires-auth="true">
    <div class="nav-scrim" data-sidebar-close></div>
    <aside class="app-drawer glass-surface" data-app-sidebar>
        <a class="sidebar-brand" href="mapa.html">CapyCode</a>
        <nav class="sidebar-nav">
            <a class="is-active" href="perfil.html">Perfil</a>
            <a href="mapa.html">Mapa</a>
            <a href="tienda.html">Tienda</a>
            <a href="about.html">Historia</a>
        </nav>
        <div class="sidebar-skin-card" data-sidebar-skin></div>
    </aside>
    <div class="scene-shell">
        <header class="scene-topbar glass-surface">
            <button class="menu-link" type="button" data-action="toggle-sidebar">
                <img src="assets/menu-icon.svg" alt="">
                <span>Men&uacute;</span>
            </button>
            <div class="topbar-right">
                <div class="hud-stat">
                    <span>Usuario</span>
                    <strong data-player-name>Invitado</strong>
                </div>
                <div class="hud-stat">
                    <span>XP</span>
                    <strong data-player-xp>0</strong>
                </div>
                <button class="scene-button ghost" type="button" data-action="logout">Salir</button>
            </div>
        </header>

        <main class="profile-layout">
            <section class="glass-surface page-hero page-hero-compact">
                <p class="panel-kicker">Perfil</p>
                <h1>Perfil Arcano</h1>
                <p class="page-subtitle">Consulta tu progreso, tus logros y la colecci&oacute;n de compa&ntilde;eros disponibles.</p>
            </section>

            <section id="profile-hero"></section>

            <section class="glass-surface profile-section">
                <div class="panel-header">
                    <div>
                        <p class="panel-kicker">Progreso</p>
                        <h2>Ritmo de aprendizaje</h2>
                    </div>
                </div>
                <div class="journey-grid" id="profile-progress"></div>
            </section>

            <section class="glass-surface profile-section">
                <div class="panel-header">
                    <div>
                        <p class="panel-kicker">Colecci&oacute;n</p>
                        <h2>Compa&ntilde;eros desbloqueados</h2>
                    </div>
                </div>
                <div class="collection-grid" id="profile-collection"></div>
            </section>

            <section class="glass-surface profile-section">
                <div class="panel-header">
                    <div>
                        <p class="panel-kicker">Logros</p>
                        <h2>Tu recorrido en la academia</h2>
                    </div>
                </div>
                <div class="achievement-grid" id="profile-achievements"></div>
            </section>
        </main>
    </div>

    <script src="js/app-data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
