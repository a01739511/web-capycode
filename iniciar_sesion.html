<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Iniciar sesi&oacute;n</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page" data-auth-mode="login">
    <div class="logo-container">
        <img src="assets/Logo de CapyCode.png" alt="Logo de CapyCode">
    </div>

    <div class="login-wrapper">
        <main class="login-card glass-panel auth-card">
            <p class="eyebrow">CapyCode</p>
            <h1 class="login-title">Bienvenido de vuelta</h1>
            <p class="auth-description">
                Inicia sesi&oacute;n para continuar con tus retos de programaci&oacute;n y retomar tu progreso.
            </p>

            <form class="login-form" id="auth-form" novalidate>
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Ingresa tu usuario"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="password">Contrase&ntilde;a</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contrase&ntilde;a"
                        autocomplete="current-password"
                        required
                        minlength="6"
                    >
                </div>

                <p class="form-message" id="form-message" aria-live="polite"></p>

                <button type="submit" class="btn-primary">Entrar a CapyCode</button>
            </form>

            <p class="register-link">
                &iquest;No tienes cuenta?
                <a href="registro.html">Crear cuenta</a>
            </p>
        </main>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
