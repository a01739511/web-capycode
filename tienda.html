<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyCode | Tienda m&aacute;gica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Metamorphous&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png">
    <link rel="icon" href="assets/favicons/favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css">
</head>
<body class="scene-body" data-requires-auth="true">
    <div class="sidebar-layout">
        <aside class="sidebar-panel app-sidebar glass-surface" data-app-sidebar>
            <a class="sidebar-brand" href="mapa.html">CapyCode</a>
            <nav class="sidebar-nav" data-sidebar-nav></nav>
            <div class="sidebar-skin-card" data-sidebar-skin></div>
        </aside>

        <div class="sidebar-main">
            <header class="scene-topbar glass-surface">
                <button class="menu-link" type="button" data-action="toggle-sidebar">
                    <img src="assets/menu-icon.svg" alt="">
                    <span>Men&uacute;</span>
                </button>
                <div class="topbar-page-title" aria-label="Tienda">Tienda</div>
                <div class="topbar-right">
                    <div class="hud-stat">
                        <span>Racha</span>
                        <strong data-player-streak>0</strong>
                    </div>
                    <div class="hud-stat">
                        <span>XP Points</span>
                        <strong data-player-xp>0</strong>
                    </div>
                    <a class="profile-link" href="perfil.html">
                        <img src="assets/user-avatar.svg" alt="Perfil">
                    </a>
                </div>
            </header>

            <main class="shop-layout">
                <section class="glass-surface shop-panel shop-catalog">
                    <div class="panel-header">
                        <div>
                            <p class="panel-kicker">Vestuarios m&aacute;gicos</p>
                            <h2>Vestuarios disponibles</h2>
                        </div>
                    </div>
                    <div class="shop-grid" id="store-grid"></div>
                </section>
            </main>

            <section class="glass-surface support-banner">
                <div>
                    <p class="panel-kicker">Necesitas mas puntos</p>
                    <h2>Completa misiones diarias para obtener XP gratis</h2>
                </div>
                <a class="scene-button primary" href="mapa.html">Ver niveles</a>
            </section>
        </div>
    </div>

    <div class="shop-modal is-hidden" id="shop-modal" aria-hidden="true">
        <div class="shop-modal-backdrop" data-shop-close></div>
        <section class="glass-surface shop-modal-card" role="dialog" aria-modal="true" aria-labelledby="shop-modal-title">
            <button class="shop-modal-close" type="button" aria-label="Cerrar detalle" data-shop-close>&times;</button>
            <div class="shop-modal-content" id="shop-modal-content"></div>
        </section>
    </div>

    <script src="js/app-data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/vendor/vanilla-tilt.min.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
